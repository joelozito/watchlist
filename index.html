<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lozito Family Watchlist</title>
<script src="https://accounts.google.com/gsi/client" defer></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0f0f13;
    --surface:   #1a1a24;
    --surface2:  #22222f;
    --border:    rgba(255,255,255,0.08);
    --border2:   rgba(255,255,255,0.15);
    --gold:      #f5a623;
    --gold-dim:  #a06b10;
    --text:      #e8e8f0;
    --text-muted:#8888a0;
    --text-dim:  #55556a;
    --danger:    #e05555;
  }

  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ── Header ── */
  .page { max-width: 960px; margin: 0 auto; padding: 2rem 1.25rem; }
  .page-header { display: flex; align-items: baseline; gap: 1rem; margin-bottom: 0.25rem; }
  h1 { font-family: 'Bebas Neue', sans-serif; font-size: 42px; font-weight: 400; letter-spacing: 2px; color: var(--gold); line-height: 1; }
  .subtitle { font-size: 12px; color: var(--text-muted); margin-bottom: 1.25rem; letter-spacing: 0.03em; }

  /* ── Toolbar ── */
  .toolbar { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 0.75rem; align-items: center; }
  .toolbar input {
    flex: 1; min-width: 180px; font-size: 13px; padding: 7px 14px;
    border: 1px solid var(--border2); border-radius: 20px;
    background: var(--surface); color: var(--text); outline: none; font-family: inherit;
  }
  .toolbar input::placeholder { color: var(--text-dim); }
  .toolbar input:focus { border-color: var(--gold-dim); }

  .btn-add {
    font-size: 12px; padding: 7px 16px; border-radius: 20px;
    border: 1px solid var(--gold); background: var(--gold); color: #000;
    cursor: pointer; white-space: nowrap; font-weight: 600; font-family: inherit;
  }
  .btn-add:hover { background: #ffc04a; border-color: #ffc04a; }
  .btn-clear {
    font-size: 12px; padding: 7px 14px; border-radius: 20px;
    border: 1px solid var(--border2); background: transparent; color: var(--text-muted);
    cursor: pointer; white-space: nowrap; font-family: inherit;
  }
  .btn-clear:hover { border-color: var(--gold-dim); color: var(--text); }
  .btn-google {
    font-size: 12px; padding: 7px 14px; border-radius: 20px;
    border: 1px solid var(--border2); background: var(--surface); color: var(--text);
    cursor: pointer; white-space: nowrap; display: flex; align-items: center; gap: 8px; font-family: inherit;
  }
  .btn-google:hover { border-color: var(--border2); background: var(--surface2); }
  .btn-google img { width: 15px; height: 15px; }
  .btn-signout {
    font-size: 11px; padding: 5px 12px; border-radius: 20px;
    border: 1px solid var(--border); background: transparent; color: var(--text-muted);
    cursor: pointer; font-family: inherit;
  }
  .btn-signout:hover { color: var(--danger); border-color: var(--danger); }

  .sync-status { font-size: 11px; color: var(--text-muted); display: flex; align-items: center; gap: 5px; }
  .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-dim); flex-shrink: 0; transition: background 0.3s; }
  .sync-dot.syncing { background: #f59e0b; }
  .sync-dot.synced  { background: #22c55e; }
  .sync-dot.error   { background: var(--danger); }

  /* ── Filters ── */
  .filters { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 0.6rem; }
  .filter-btn {
    font-size: 11px; padding: 4px 12px; border-radius: 20px;
    border: 1px solid var(--border2); background: transparent; color: var(--text-muted);
    cursor: pointer; transition: all 0.15s; white-space: nowrap; font-family: inherit; letter-spacing: 0.02em;
  }
  .filter-btn:hover:not(.active) { border-color: var(--gold-dim); color: var(--text); }
  .filter-btn.active { background: var(--gold); color: #000; border-color: var(--gold); font-weight: 600; }

  /* ── Stats ── */
  .stats { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.5rem; }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 8px 18px; text-align: center; }
  .stat-num { font-family: 'Bebas Neue', sans-serif; font-size: 26px; color: var(--gold); line-height: 1; }
  .stat-label { font-size: 10px; color: var(--text-muted); margin-top: 2px; letter-spacing: 0.05em; text-transform: uppercase; }

  /* ── Section headers ── */
  .section-head {
    font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 2px;
    color: var(--text-muted); padding: 1.2rem 0 0.5rem;
    border-top: 1px solid var(--border); margin-top: 0.5rem;
  }
  .section-head:first-of-type { border-top: none; margin-top: 0; }

  /* ── Cards — poster style ── */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; margin-bottom: 0.5rem; }

  .card {
    position: relative; border-radius: 10px; overflow: hidden;
    aspect-ratio: 2/3; cursor: pointer;
    background: var(--surface2);
    border: 1px solid var(--border);
    transition: transform 0.2s, border-color 0.2s;
  }
  .card:hover { transform: translateY(-4px) scale(1.02); border-color: var(--gold); }

  .card-poster-bg {
    position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: cover; display: block; transition: opacity 0.3s;
  }
  .card-poster-loading { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
  .card-poster-loading span { font-size: 28px; opacity: 0.15; }
  .badge-no-poster { position: absolute; top: 7px; left: 7px; font-size: 9px; padding: 2px 6px; border-radius: 4px; background: rgba(245,166,35,0.25); color: #f5a623; border: 1px solid rgba(245,166,35,0.4); font-weight: 600; letter-spacing: 0.04em; cursor: pointer; z-index: 3; }

  /* Gradient overlay so text is always readable */
  .card-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.92) 0%, rgba(0,0,0,0.4) 50%, rgba(0,0,0,0.05) 100%);
  }
  .card-body {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 10px 10px 8px;
  }
  .card-title { font-size: 12px; font-weight: 600; color: #fff; line-height: 1.3; margin-bottom: 3px; }
  .card-genre { font-size: 10px; color: rgba(255,255,255,0.6); margin-bottom: 3px; }
  .card-rating { font-size: 10px; color: var(--gold); font-weight: 600; }
  .card-bottom { display: flex; align-items: center; justify-content: space-between; margin-top: 5px; flex-wrap: wrap; gap: 3px; }
  .card-jw {
    font-size: 9px; color: rgba(255,255,255,0.5); text-decoration: none;
    padding: 2px 5px; border: 1px solid rgba(255,255,255,0.2); border-radius: 4px; white-space: nowrap;
  }
  .card-jw:hover { color: #fff; border-color: rgba(255,255,255,0.5); }

  /* Badges */
  .badge { display: inline-block; font-size: 9px; padding: 2px 6px; border-radius: 4px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; }
  .badge-seen    { background: rgba(34,197,94,0.25);  color: #4ade80; }
  .badge-family  { background: rgba(139,92,246,0.25); color: #a78bfa; }
  .badge-adult   { background: rgba(59,130,246,0.25); color: #60a5fa; }
  .badge-horror  { background: rgba(239,68,68,0.25);  color: #f87171; }
  .badge-holiday { background: rgba(245,158,11,0.25); color: #fbbf24; }

  /* ── Auth banner ── */
  .auth-banner {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 3rem 2rem; text-align: center; margin: 3rem auto; max-width: 420px;
  }
  .auth-banner h2 { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 2px; color: var(--gold); margin-bottom: 0.5rem; }
  .auth-banner p { font-size: 13px; color: var(--text-muted); margin-bottom: 1.5rem; line-height: 1.6; }

  /* ── Modal ── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.75);
    display: flex; align-items: flex-start; justify-content: center;
    padding: 2rem 1rem; z-index: 1000; overflow-y: auto;
  }
  .modal {
    background: var(--surface); border-radius: 14px; padding: 0;
    max-width: 520px; width: 100%; position: relative;
    border: 1px solid var(--border2); overflow: hidden;
  }
  .modal-close-btn {
    position: absolute; top: 12px; right: 14px; font-size: 20px;
    background: rgba(0,0,0,0.5); border: none; cursor: pointer;
    color: #fff; line-height: 1; border-radius: 50%; width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center; z-index: 2;
  }
  .modal-close-btn:hover { background: rgba(0,0,0,0.8); }

  /* Big poster header */
  .modal-hero {
    position: relative; width: 100%; aspect-ratio: 16/9; background: var(--surface2); overflow: hidden;
  }
  .modal-hero img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .modal-hero-grad {
    position: absolute; inset: 0;
    background: linear-gradient(to top, var(--surface) 0%, transparent 60%);
  }
  .modal-hero-title {
    position: absolute; bottom: 0; left: 0; right: 0; padding: 1rem 1.25rem 0.75rem;
  }
  .modal-hero-title h3 { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 1px; color: #fff; line-height: 1.1; }
  .modal-hero-title .modal-meta { font-size: 12px; color: rgba(255,255,255,0.6); margin-top: 3px; }

  .modal-body { padding: 0.75rem 1.25rem 1.25rem; }
  .modal-info p { font-size: 12px; color: var(--text-muted); margin-bottom: 3px; line-height: 1.45; }
  .modal-plot { font-size: 13px; color: var(--text); line-height: 1.65; margin: 10px 0; border-top: 1px solid var(--border); padding-top: 10px; }
  .modal-ratings { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
  .rating-pill { font-size: 11px; padding: 3px 10px; border-radius: 10px; background: var(--surface2); color: var(--text); border: 1px solid var(--border2); }
  .modal-loading { font-size: 13px; color: var(--text-muted); padding: 2rem 0; text-align: center; }
  .modal-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; border-top: 1px solid var(--border); padding-top: 12px; }

  /* Buttons */
  .btn { font-size: 12px; padding: 6px 14px; border-radius: 7px; border: 1px solid var(--border2); background: transparent; color: var(--text); cursor: pointer; font-family: inherit; }
  .btn:hover { border-color: var(--border2); background: var(--surface2); }
  .btn-primary { background: var(--gold); color: #000; border-color: var(--gold); font-weight: 600; }
  .btn-primary:hover { background: #ffc04a; }
  .btn-danger { color: var(--danger); border-color: rgba(224,85,85,0.3); }
  .btn-danger:hover { background: rgba(224,85,85,0.1); }
  .btn-seen { background: rgba(34,197,94,0.15); color: #4ade80; border-color: rgba(34,197,94,0.3); }
  .btn-seen:hover { background: rgba(34,197,94,0.25); }
  .btn-unseen { background: rgba(245,158,11,0.15); color: #fbbf24; border-color: rgba(245,158,11,0.3); }
  .btn-unseen:hover { background: rgba(245,158,11,0.25); }

  /* Forms */
  .form-group { margin-bottom: 12px; }
  .form-group label { display: block; font-size: 11px; font-weight: 600; color: var(--text-muted); margin-bottom: 5px; letter-spacing: 0.05em; text-transform: uppercase; }
  .form-group input, .form-group select {
    width: 100%; font-size: 13px; padding: 8px 12px;
    border: 1px solid var(--border2); border-radius: 7px;
    background: var(--surface2); color: var(--text); outline: none; font-family: inherit;
  }
  .form-group input:focus, .form-group select:focus { border-color: var(--gold-dim); }
  .form-group select option { background: var(--surface2); }
  .form-row { display: flex; gap: 10px; }
  .form-row .form-group { flex: 1; }
  .form-check { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-muted); margin-top: 6px; cursor: pointer; }
  .form-check input[type=checkbox] { width: 15px; height: 15px; cursor: pointer; accent-color: var(--gold); }
  .form-modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 1px; color: var(--gold); margin-bottom: 1rem; }

  .btn-random {
    font-size: 12px; padding: 7px 14px; border-radius: 20px;
    border: 1px solid rgba(245,166,35,0.5); background: transparent; color: var(--gold);
    cursor: pointer; white-space: nowrap; font-family: inherit; letter-spacing: 0.03em;
    transition: all 0.15s;
  }
  .btn-random:hover { background: rgba(245,166,35,0.1); border-color: var(--gold); }

  /* Random picker modal */
  .picker-card {
    background: var(--surface2); border-radius: 12px; overflow: hidden;
    margin-bottom: 1rem; display: flex; gap: 0;
  }
  .picker-poster { width: 120px; min-width: 120px; aspect-ratio: 2/3; object-fit: cover; }
  .picker-poster-ph { width: 120px; min-width: 120px; aspect-ratio: 2/3; background: var(--surface); display: flex; align-items: center; justify-content: center; font-size: 36px; opacity: 0.15; }
  .picker-info { padding: 1rem; flex: 1; display: flex; flex-direction: column; gap: 5px; }
  .picker-title { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 1px; color: #fff; line-height: 1.1; }
  .picker-meta { font-size: 12px; color: var(--text-muted); }
  .picker-genre { font-size: 12px; color: var(--text-muted); }
  .picker-rating { font-size: 12px; color: var(--gold); font-weight: 600; }
  .picker-plot { font-size: 12px; color: var(--text-muted); line-height: 1.6; margin-top: 4px; }
  .picker-pool { font-size: 11px; color: var(--text-dim); margin-bottom: 0.75rem; }
  .picker-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .empty { color: var(--text-muted); font-size: 13px; padding: 3rem 0; text-align: center; }

  @media (max-width: 500px) {
    .grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
    h1 { font-size: 32px; }
  }
</style>
</head>

<div class="page">
  <div class="page-header">
    <h1>Lozito Watchlist</h1>
  </div>
  <p class="subtitle" id="subtitle">Sign in to load your watchlist from Google Sheets.</p>
  <div class="toolbar">
    <input type="text" id="search" placeholder="Search titles..." oninput="onSearch()" style="display:none">
    <button class="btn-clear" id="btn-clear" onclick="clearAll()" style="display:none">Clear</button>
    <div class="sync-status" id="sync-status" style="display:none">
      <span class="sync-dot" id="sync-dot"></span>
      <span id="sync-label">Synced</span>
    </div>
    <div style="flex:1"></div>
    <button class="btn-signout" id="btn-signout" onclick="signOut()" style="display:none">Sign out</button>
    <button class="btn-signout" id="btn-settings" onclick="promptForOMDBKey()" style="display:none" title="Update OMDB API key">&#9881; API key</button>
    <button class="btn-google" id="btn-google" onclick="signIn()">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt=""> Sign in with Google
    </button>
    <button class="btn-add" id="btn-add" onclick="openAddModal()" style="display:none">+ Add title</button>
    <button class="btn-random" id="btn-random" onclick="pickRandom()" style="display:none" title="Pick a random title from current filters">&#9668; Pick one</button>
  </div>
  <div class="filters" id="filters" style="display:none">
    <button class="filter-btn" data-f="to-watch" onclick="toggleFilter('to-watch')">To watch</button>
    <button class="filter-btn" data-f="seen" onclick="toggleFilter('seen')">Seen</button>
    <button class="filter-btn" data-f="family" onclick="toggleFilter('family')">Family</button>
    <button class="filter-btn" data-f="adults" onclick="toggleFilter('adults')">Adults</button>
    <button class="filter-btn" data-f="series" onclick="toggleFilter('series')">Series</button>
    <button class="filter-btn" data-f="horror" onclick="toggleFilter('horror')">Horror</button>
    <button class="filter-btn" data-f="holiday" onclick="toggleFilter('holiday')">Holiday</button>
  </div>
  <div class="filters" id="genre-filters" style="margin-top:-4px;margin-bottom:1rem;display:none"></div>
  <div class="stats" id="stats"></div>
  <div id="output">
    <div class="auth-banner" id="auth-banner">
      <h2>Lozito Family Watchlist</h2>
      <p>Sign in with Google to load your watchlist.<br>Your data is stored in a Google Sheet in your own Drive.</p>
      <button class="btn-google" onclick="signIn()" style="margin:0 auto">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt=""> Sign in with Google
      </button>
    </div>
  </div>
</div>
<div id="modal-container"></div>

const CLIENT_ID = '650305058013-1ip2vqpnj5g0il91iunqt3lgapqlsfng.apps.googleusercontent.com';
const SCOPES = 'https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/drive.file';
const SHEET_NAME = 'Family Watchlist';

let accessToken = null;
let spreadsheetId = null;
let _state = { overrides: {}, additions: [] };
let syncTimer = null;
let pendingSync = false;

// ── Auth ────────────────────────────────────────────────────────────────────
function signIn() {
  if (typeof google === 'undefined' || !google.accounts) {
    setTimeout(signIn, 300); return;
  }
  const client = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: async (resp) => {
      if (resp.error) { setSyncStatus('error', 'Sign-in failed'); return; }
      accessToken = resp.access_token;
      localStorage.setItem('wl_token', accessToken);
      await afterSignIn();
    },
  });
  client.requestAccessToken();
}

function signOut() {
  if (typeof google !== 'undefined' && google.accounts && accessToken) {
    google.accounts.oauth2.revoke(accessToken);
  }
  accessToken = null;
  spreadsheetId = null;
  localStorage.removeItem('wl_token');
  showAuthUI(false);
}

async function afterSignIn() {
  showAuthUI(true);
  setSyncStatus('syncing', 'Loading...');
  try {
    spreadsheetId = localStorage.getItem('wl_sheet_id') || null;
    if (spreadsheetId) {
      const ok = await sheetExists(spreadsheetId);
      if (!ok) spreadsheetId = null;
    }
    if (!spreadsheetId) {
      spreadsheetId = await findOrCreateSheet();
      localStorage.setItem('wl_sheet_id', spreadsheetId);
    }
    await loadFromSheet();
    setSyncStatus('synced', 'Synced');
  } catch(e) {
    console.error('Sheet load failed, falling back to localStorage:', e);
    // Fall back to whatever is in localStorage
    try { _state.overrides = JSON.parse(localStorage.getItem('wl_overrides') || '{}'); } catch(_) {}
    try { _state.additions = JSON.parse(localStorage.getItem('wl_additions') || '[]'); } catch(_) {}
    OMDB_KEY = localStorage.getItem('wl_omdb_key') || null;
    setSyncStatus('error', 'Load failed — using local data');
  }

  if (!OMDB_KEY) {
    promptForOMDBKey();
  } else {
    render();
    // Re-run observer in case any cards rendered before the key arrived
    setTimeout(startObserver, 100);
  }
}

// ── Sheets API helpers ───────────────────────────────────────────────────────
async function sheetsRequest(method, path, body) {
  const res = await fetch('https://sheets.googleapis.com/v4/spreadsheets' + path, {
    method,
    headers: {
      'Authorization': 'Bearer ' + accessToken,
      'Content-Type': 'application/json',
    },
    body: body ? JSON.stringify(body) : undefined,
  });
  if (!res.ok) { const t = await res.text(); throw new Error(t); }
  return res.json();
}

async function driveRequest(method, path, body) {
  const res = await fetch('https://www.googleapis.com/drive/v3' + path, {
    method,
    headers: {
      'Authorization': 'Bearer ' + accessToken,
      'Content-Type': 'application/json',
    },
    body: body ? JSON.stringify(body) : undefined,
  });
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

async function sheetExists(id) {
  try {
    await sheetsRequest('GET', `/${id}?fields=spreadsheetId`);
    return true;
  } catch(e) { return false; }
}

async function findOrCreateSheet() {
  const res = await fetch(
    `https://www.googleapis.com/drive/v3/files?q=name='${SHEET_NAME}' and mimeType='application/vnd.google-apps.spreadsheet' and trashed=false&fields=files(id,name)`,
    { headers: { 'Authorization': 'Bearer ' + accessToken } }
  );
  const data = await res.json();
  if (data.files && data.files.length > 0) {
    const sid = data.files[0].id;
    await ensureSettingsTab(sid);
    return sid;
  }
  const created = await sheetsRequest('POST', '', {
    properties: { title: SHEET_NAME },
    sheets: [
      { properties: { title: 'Data' } },
      { properties: { title: 'Settings' } },
    ],
  });
  const sid = created.spreadsheetId;
  await sheetsRequest('PUT', `/${sid}/values/Data!A1:E2?valueInputOption=RAW`, {
    values: [
      ['id', 'overrides_json', 'additions_json', 'last_updated', 'version'],
      ['1', '{}', '[]', new Date().toISOString(), '1'],
    ],
  });
  await sheetsRequest('PUT', `/${sid}/values/Settings!A1:B1?valueInputOption=RAW`, {
    values: [['omdb_key', '']],
  });
  return sid;
}

async function ensureSettingsTab(sid) {
  try {
    await sheetsRequest('GET', `/${sid}/values/Settings!A1`);
  } catch(e) {
    await sheetsRequest('POST', `/${sid}:batchUpdate`, {
      requests: [{ addSheet: { properties: { title: 'Settings' } } }],
    });
    await sheetsRequest('PUT', `/${sid}/values/Settings!A1:B1?valueInputOption=RAW`, {
      values: [['omdb_key', '']],
    });
  }
}

async function loadFromSheet() {
  await ensureSettingsTab(spreadsheetId);
  const [stateResp, keyResp] = await Promise.all([
    sheetsRequest('GET', `/${spreadsheetId}/values/Data!A2:E2`),
    sheetsRequest('GET', `/${spreadsheetId}/values/Settings!B1`),
  ]);
  const dataRow = (stateResp.values || [])[0];
  const keyCell = ((keyResp.values || [])[0] || [])[0] || '';
  if (dataRow) {
    try { _state.overrides = JSON.parse(dataRow[1] || '{}'); } catch(e) {}
    try { _state.additions = JSON.parse(dataRow[2] || '[]'); } catch(e) {}
  } else {
    await sheetsRequest('PUT', `/${spreadsheetId}/values/Data!A2:E2?valueInputOption=RAW`, {
      values: [['1', '{}', '[]', new Date().toISOString(), '1']],
    });
  }
  if (keyCell) {
    OMDB_KEY = keyCell;
    localStorage.setItem('wl_omdb_key', OMDB_KEY);
    Object.keys(omdbCache).forEach(k => { if (omdbCache[k] === null) delete omdbCache[k]; });
  }
  localStorage.setItem('wl_overrides', JSON.stringify(_state.overrides));
  localStorage.setItem('wl_additions', JSON.stringify(_state.additions));
}

async function pushToSheet() {
  if (!spreadsheetId || !accessToken) return;
  setSyncStatus('syncing', 'Saving...');
  try {
    await sheetsRequest('PUT', `/${spreadsheetId}/values/Data!A2:E2?valueInputOption=RAW`, {
      values: [[
        '1',
        JSON.stringify(_state.overrides),
        JSON.stringify(_state.additions),
        new Date().toISOString(),
        '1',
      ]],
    });
    setSyncStatus('synced', 'Synced');
  } catch(e) {
    setSyncStatus('error', 'Sync error — check console');
    console.error('Sheet write failed:', e);
  }
}

async function saveOMDBKeyToSheet() {
  if (!spreadsheetId || !accessToken || !OMDB_KEY) return;
  try {
    await sheetsRequest('PUT', `/${spreadsheetId}/values/Settings!B1?valueInputOption=RAW`, {
      values: [[OMDB_KEY]],
    });
  } catch(e) {
    console.error('Failed to save OMDB key:', e);
  }
}

// Debounce sheet writes — batch rapid changes into one write
function scheduleSyncToSheet() {
  clearTimeout(syncTimer);
  syncTimer = setTimeout(pushToSheet, 1200);
}

// ── State helpers ────────────────────────────────────────────────────────────
function loadState() { return _state; }

function saveState(s) {
  _state = s;
  localStorage.setItem('wl_overrides', JSON.stringify(s.overrides));
  localStorage.setItem('wl_additions', JSON.stringify(s.additions));
  scheduleSyncToSheet();
}

function getList() {
  const s = loadState();
  const base = BASE_LIST
    .map(item => s.overrides[item.id] ? {...item, ...s.overrides[item.id]} : item)
    .filter(item => !s.overrides[item.id]?.deleted);
  return [...base, ...s.additions];
}
function applyOverride(id, changes) {
  const s = loadState();
  s.overrides[id] = {...(s.overrides[id]||{}), ...changes};
  saveState(s);
}
function applyAddition(item) {
  const s = loadState();
  s.additions.push(item);
  saveState(s);
}
function updateAddition(id, changes) {
  const s = loadState();
  const i = s.additions.findIndex(a => a.id === id);
  if (i !== -1) s.additions[i] = {...s.additions[i], ...changes};
  saveState(s);
}
function deleteItem(id) {
  const s = loadState();
  if (id.startsWith('u_')) s.additions = s.additions.filter(a => a.id !== id);
  else s.overrides[id] = {...(s.overrides[id]||{}), deleted:true};
  saveState(s);
}

// OMDB
async function fetchOMDB(title) {
  if (!OMDB_KEY) return null;
  const key = title.toLowerCase();
  if (omdbCache[key] !== undefined) return omdbCache[key];
  try {
    const r = await fetch(`https://www.omdbapi.com/?t=${encodeURIComponent(title)}&apikey=${OMDB_KEY}`);
    const d = await r.json();
    omdbCache[key] = d.Response === 'True' ? d : null;
  } catch(e) { omdbCache[key] = null; }
  return omdbCache[key];
}

// Multi-select filter state — Sets of active values
// activeFilters: Set of audience/status tags ('family','adults','horror','seen','to-watch','series','holiday')
// activeGenres:  Set of genre strings
let activeFilters = new Set();
let activeGenres = new Set();

function toggleFilter(f) {
  if (activeFilters.has(f)) activeFilters.delete(f);
  else activeFilters.add(f);
  syncFilterButtons();
  updateClearBtn();
  render();
}
function toggleGenre(g) {
  if (activeGenres.has(g)) activeGenres.delete(g);
  else activeGenres.add(g);
  refreshGenreFilters();
  updateClearBtn();
  render();
}
function clearAll() {
  activeFilters.clear();
  activeGenres.clear();
  document.getElementById('search').value = '';
  syncFilterButtons();
  refreshGenreFilters();
  updateClearBtn();
  render();
}
function syncFilterButtons() {
  document.querySelectorAll('#filters .filter-btn').forEach(b => {
    b.classList.toggle('active', activeFilters.has(b.dataset.f));
  });
}
function updateClearBtn() {
  const q = document.getElementById('search').value.trim();
  const active = q || activeFilters.size > 0 || activeGenres.size > 0;
  document.getElementById('btn-clear').style.display = active ? '' : 'none';
}
function onSearch() {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => { updateClearBtn(); render(); }, 280);
}

// An item passes if it satisfies ALL active filter groups (AND between groups, OR within each group)
// Group 1: audience/status filters
// Group 2: genre filters
function itemPassesFilters(item) {
  // Audience/status: if any filters active, item must match at least one
  if (activeFilters.size > 0) {
    let pass = false;
    if (activeFilters.has('seen') && item.seen) pass = true;
    if (activeFilters.has('to-watch') && !item.seen) pass = true;
    if (activeFilters.has('family') && item.aud === 'family' && !item.seen) pass = true;
    if (activeFilters.has('adults') && item.aud === 'adults' && !item.seen) pass = true;
    if (activeFilters.has('horror') && item.aud === 'horror' && !item.seen) pass = true;
    if (activeFilters.has('series') && item.cat === 'series' && !item.seen) pass = true;
    if (activeFilters.has('holiday') && item.isHoliday && !item.seen) pass = true;
    if (!pass) return false;
  }
  // Genre: if any genres active, item must have a matching genre in genreMap
  if (activeGenres.size > 0) {
    const itemGenres = (genreMap[item.id] || '').split(',').map(g => g.trim()).filter(Boolean);
    if (!itemGenres.some(g => activeGenres.has(g))) return false;
  }
  return true;
}
function matches(item, q) {
  if (q && !item.t.toLowerCase().includes(q) && !(item.note||'').toLowerCase().includes(q)) return false;
  return itemPassesFilters(item);
}
function badgeHTML(item) {
  if (item.seen) return '<span class="badge badge-seen">Seen</span>';
  if (item.isHoliday) return '<span class="badge badge-holiday">Holiday</span>';
  if (item.aud === 'horror') return '<span class="badge badge-horror">Horror</span>';
  if (item.aud === 'family') return '<span class="badge badge-family">Family</span>';
  if (item.aud === 'adults') return '<span class="badge badge-adult">Adults</span>';
  return '';
}
const SEC = {
  'family-movie':'Family movies','family-series':'Family series',
  'adults-movie':'Adults movies','adults-series':'Adults series',
  'horror-movie':'Horror','horror-series':'Horror series',
  'holiday-movie':'Holiday','seen-movie':'Movies seen','seen-series':'Series seen'
};
function encItem(item) { return encodeURIComponent(JSON.stringify(item)); }
function decItem(s) { return JSON.parse(decodeURIComponent(s)); }

// Lazy enrichment via IntersectionObserver
let enrichObserver = null;
const enrichQueue = new Set();

function startObserver() {
  if (enrichObserver) enrichObserver.disconnect();
  enrichObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const card = entry.target;
        enrichObserver.unobserve(card);
        enrichCard(card);
      }
    });
  }, { rootMargin: '200px' });
  document.querySelectorAll('.card[data-enrich]').forEach(c => enrichObserver.observe(c));
}

async function enrichCard(card) {
  // If key not loaded yet, wait up to 5 seconds for it
  if (!OMDB_KEY) {
    let waited = 0;
    while (!OMDB_KEY && waited < 5000) {
      await new Promise(r => setTimeout(r, 200));
      waited += 200;
    }
    if (!OMDB_KEY) return; // still no key after waiting, give up
  }
  const title = card.dataset.enrich;
  const omdbTitle = card.dataset.omdb || title;
  const itemId = card.dataset.id;
  const data = await fetchOMDB(omdbTitle);

  const genreEl = card.querySelector('.card-genre');
  const ratingEl = card.querySelector('.card-rating');

  // Helper: add a "Fix poster" badge that opens the edit form
  function addNoPosterBadge() {
    if (card.querySelector('.badge-no-poster')) return;
    const badge = document.createElement('span');
    badge.className = 'badge-no-poster';
    badge.title = 'Click to fix OMDB search title';
    badge.textContent = 'Fix poster';
    badge.addEventListener('click', (e) => {
      e.stopPropagation();
      const item = getList().find(i => i.id === itemId);
      if (item) openEditModal(encItem(item));
    });
    card.appendChild(badge);
  }

  if (!data) {
    // OMDB returned nothing — flag it
    if (genreEl) genreEl.textContent = '';
    const loader = card.querySelector('.card-poster-loading');
    if (loader) loader.innerHTML = '<span style="font-size:32px;opacity:0.12">&#127916;</span>';
    addNoPosterBadge();
    return;
  }

  // Store all genres (comma-separated) for multi-genre filtering
  const allGenres = (data.Genre && data.Genre !== 'N/A') ? data.Genre : '';
  const displayGenre = allGenres ? allGenres.split(',')[0].trim() : '';
  const rating = (data.imdbRating && data.imdbRating !== 'N/A') ? data.imdbRating : '';
  const rated = (data.Rated && data.Rated !== 'N/A') ? data.Rated : '';

  if (allGenres && itemId) {
    genreMap[itemId] = allGenres;
    refreshGenreFilters();
  }

  // Inject poster image into card
  if (data.Poster && data.Poster !== 'N/A') {
    const loader = card.querySelector('.card-poster-loading');
    if (loader) {
      const img = document.createElement('img');
      img.className = 'card-poster-bg';
      img.src = data.Poster;
      img.alt = '';
      card.insertBefore(img, loader);
      loader.remove();
    }
  } else {
    // OMDB found the title but has no poster image
    const loader = card.querySelector('.card-poster-loading');
    if (loader) loader.innerHTML = '<span style="font-size:32px;opacity:0.12">&#127916;</span>';
    addNoPosterBadge();
  }

  if (genreEl) genreEl.textContent = displayGenre;
  if (ratingEl) {
    const parts = [];
    if (rating) parts.push('★ ' + rating);
    if (rated) parts.push(rated);
    ratingEl.textContent = parts.join(' · ');
  }
}

function refreshGenreFilters() {
  // Count occurrences of each individual genre across all items
  const counts = {};
  const list = getList();
  list.forEach(item => {
    const gs = genreMap[item.id];
    if (!gs) return;
    gs.split(',').map(g => g.trim()).filter(Boolean).forEach(g => {
      counts[g] = (counts[g] || 0) + 1;
    });
  });
  const sorted = Object.entries(counts).sort((a,b) => b[1]-a[1]).map(e => e[0]);
  const bar = document.getElementById('genre-filters');
  if (!bar) return;
  bar.innerHTML = sorted.map(g =>
    `<button class="filter-btn${activeGenres.has(g)?' active':''}" data-g="${g}" onclick="toggleGenre('${g.replace(/'/g,"\\'")}')">${g}</button>`
  ).join('');
}

function jwLink(title) {
  const q = encodeURIComponent(title);
  return `https://www.justwatch.com/us/search?q=${q}`;
}

function render() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const list = getList();
  const filtered = list.filter(i => matches(i, q));
  const buckets = {};
  filtered.forEach(item => {
    const key = item.seen ? 'seen-'+item.cat : item.isHoliday ? 'holiday-movie' : item.aud+'-'+item.cat;
    (buckets[key] = buckets[key]||[]).push(item);
  });
  const order = ['family-movie','family-series','adults-movie','adults-series','horror-movie','holiday-movie','seen-movie','seen-series'];
  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="stat-num">${filtered.length}</div><div class="stat-label">Showing</div></div>
    <div class="stat"><div class="stat-num">${filtered.filter(i=>!i.seen).length}</div><div class="stat-label">To watch</div></div>
    <div class="stat"><div class="stat-num">${filtered.filter(i=>i.seen).length}</div><div class="stat-label">Seen</div></div>
  `;
  if (!filtered.length) { document.getElementById('output').innerHTML = '<div class="empty">No results found.</div>'; return; }
  let html = '';
  order.forEach(key => {
    if (!buckets[key]?.length) return;
    const items = [...buckets[key]].sort((a,b) => a.t.localeCompare(b.t));
    html += `<div class="section-head">${SEC[key]||key} (${items.length})</div><div class="grid">`;
    items.forEach(item => {
      const omdbAttr = item.omdb ? `data-omdb="${item.omdb}"` : '';
      const jw = jwLink(item.t);
      html += `<div class="card" data-id="${item.id}" data-enrich="${item.t.replace(/"/g,'&quot;')}" ${omdbAttr} onclick="openModal('${encItem(item)}')">
        <div class="card-poster-loading"><span>&#127916;</span></div>
        <div class="card-overlay"></div>
        <div class="card-body">
          <div class="card-title">${item.t}</div>
          <div class="card-genre"></div>
          <div class="card-rating"></div>
          <div class="card-bottom">
            <div>${badgeHTML(item)}</div>
            <a class="card-jw" href="${jw}" target="_blank" onclick="event.stopPropagation()">Where to watch</a>
          </div>
        </div>
      </div>`;
    });
    html += '</div>';
  });
  document.getElementById('output').innerHTML = html;
  startObserver();
}

          </div>
          <div class="picker-actions">
            <button class="btn btn-primary" onclick="closeModal();openModal('${encItem(item)}')">View details</button>
            <button class="btn btn-seen" onclick="toggleSeen('${item.id}',true);closeModal()">Mark as seen ✓</button>
            <button class="btn" onclick="pickRandom()">Pick again &#8635;</button>
          </div>
        </div>
      </div>
    </div>`;

  // Load OMDB data to enrich the picker card
  const d = await fetchOMDB(item.omdb || item.t);
  if (!d) return;
  const f = v => (v && v !== 'N/A') ? v : '';
  const meta = [f(d.Year), f(d.Rated), f(d.Runtime)].filter(Boolean).join(' · ');
  if (meta) document.getElementById('picker-meta').textContent = meta;
  if (f(d.Genre)) document.getElementById('picker-genre').textContent = f(d.Genre);
  if (f(d.imdbRating)) document.getElementById('picker-rating').textContent = '★ ' + d.imdbRating;
  if (f(d.Plot)) document.getElementById('picker-plot').textContent = f(d.Plot);
  if (f(d.Poster)) {
    const ph = document.querySelector('.picker-poster-ph');
    if (ph) {
      const img = document.createElement('img');
      img.className = 'picker-poster';
      img.src = d.Poster;
      img.alt = '';
      ph.replaceWith(img);
    }
  }
}

function closeModal() { document.getElementById('modal-container').innerHTML = ''; }

// Add / Edit form
function openAddModal() { showForm(null); }
function openEditModal(enc) { showForm(decItem(enc)); }
function showForm(item) {
  const isEdit = !!item;
  const v = (f, def='') => item ? (item[f] ?? def) : def;
  const sel = (f, val) => v(f) === val ? 'selected' : '';
  const chk = f => v(f, false) ? 'checked' : '';
  document.getElementById('modal-container').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <button class="modal-close-btn" onclick="closeModal()">&times;</button>
        <p class="form-modal-title">${isEdit ? 'Edit title' : 'Add a title'}</p>
        <div class="form-group">
          <label>Title</label>
          <input id="f-title" type="text" value="${v('t').replace(/"/g,'&quot;')}" placeholder="Movie or show title">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Type</label>
            <select id="f-cat">
              <option value="movie" ${sel('cat','movie')}>Movie</option>
              <option value="series" ${sel('cat','series')}>Series</option>
            </select>
          </div>
          <div class="form-group">
            <label>Audience</label>
            <select id="f-aud">
              <option value="family" ${sel('aud','family')}>Family</option>
              <option value="adults" ${sel('aud','adults')}>Adults</option>
              <option value="horror" ${sel('aud','horror')}>Horror</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>Note <span style="font-weight:400;color:var(--text-dim)">(optional)</span></label>
          <input id="f-note" type="text" value="${v('note').replace(/"/g,'&quot;')}" placeholder="e.g. Netflix, for Jen, 1988...">
        </div>
        <div class="form-group">
          <label>OMDB search title <span style="font-weight:400;color:var(--text-dim)">(only if poster is missing)</span></label>
          <input id="f-omdb" type="text" value="${v('omdb').replace(/"/g,'&quot;')}" placeholder="e.g. Adventures of Buckaroo Banzai">
          <div style="font-size:11px;color:var(--text-dim);margin-top:4px">Leave blank to use the display title. Try the exact title from IMDb if the poster isn't loading.</div>
        </div>
        <div class="form-group">
          <label>Options</label>
          <label class="form-check"><input type="checkbox" id="f-seen" ${chk('seen')}> Already seen</label>
          <label class="form-check"><input type="checkbox" id="f-holiday" ${chk('isHoliday')}> Holiday film</label>
        </div>
        <div class="modal-actions">
          <button class="btn btn-primary" onclick="saveForm('${isEdit ? item.id : ''}')">${isEdit ? 'Save changes' : 'Add to list'}</button>
          <button class="btn" onclick="closeModal()">Cancel</button>
        </div>
      </div>
    </div>`;
  setTimeout(() => document.getElementById('f-title')?.focus(), 50);
}

function saveForm(editId) {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { alert('Please enter a title.'); return; }
  const omdbOverride = document.getElementById('f-omdb').value.trim();
  const changes = {
    t: title,
    cat: document.getElementById('f-cat').value,
    aud: document.getElementById('f-aud').value,
    note: document.getElementById('f-note').value.trim(),
    seen: document.getElementById('f-seen').checked,
    isHoliday: document.getElementById('f-holiday').checked,
    omdb: omdbOverride || undefined,
  };
  // Remove omdb key entirely if blank so base list value isn't shadowed
  if (!omdbOverride) delete changes.omdb;

  // Bust OMDB cache for old and new search titles so card re-fetches
  if (editId) {
    const existing = getList().find(i => i.id === editId);
    if (existing) {
      delete omdbCache[(existing.omdb || existing.t).toLowerCase()];
    }
  }
  delete omdbCache[(omdbOverride || title).toLowerCase()];

  if (editId) {
    if (editId.startsWith('u_')) updateAddition(editId, changes);
    else applyOverride(editId, changes);
  } else {
    applyAddition({id:'u_'+Date.now(), ...changes});
  }
  closeModal(); render();
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
// render() is called after sign-in via afterSignIn()
</script>
</body>
</html>
